<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЗАЛОГ.ПРО | Mobile Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; margin: 0; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-text { color: #B8860B; }
        .gold-bg { background: #B8860B; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>
    <div id="app" class="flex flex-col h-screen w-full relative">
        <!-- iOS Status Bar -->
        <div class="h-12 flex justify-between items-center px-8 shrink-0">
            <div id="clock" class="text-xs font-bold">06:45</div>
            <div class="flex gap-1.5 opacity-80">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 20.5L2 11.5L4.5 9.5L12 16.5L19.5 9.5L22 11.5L12 20.5Z"/></svg>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M15.5 14H14.71L14.43 13.72C15.41 12.59 16 11.11 16 9.5C16 5.91 13.09 3 9.5 3C5.91 3 3 5.91 3 9.5C3 13.09 5.91 16 9.5 16C11.11 16 12.59 15.41 13.72 14.43L14 14.71V15.5L19 20.5L20.5 19L15.5 14ZM9.5 14C7.01 14 5 11.99 5 9.5C5 7.01 7.01 5 9.5 5C11.99 5 14 7.01 14 9.5C14 11.99 11.99 14 9.5 14Z"/></svg>
            </div>
        </div>

        <!-- App Header -->
        <div class="px-6 py-4 flex justify-between items-center shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-[#B8860B] to-[#C9A86C] flex items-center justify-center font-black text-black text-sm shadow-lg">AV</div>
                <div>
                    <div class="text-xs font-bold">Александр В.</div>
                    <div class="text-[8px] gold-text font-black uppercase tracking-widest border border-[#B8860B]/30 px-1.5 py-0.5 rounded-full mt-0.5">Квал. Инвестор</div>
                </div>
            </div>
            <div class="w-10 h-10 glass rounded-xl flex items-center justify-center relative">
                <div class="absolute top-2.5 right-2.5 w-1.5 h-1.5 bg-[#B8860B] rounded-full"></div>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            </div>
        </div>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto px-6 space-y-6 hide-scrollbar pt-2">
            <!-- Balance Card -->
            <div class="glass p-8 rounded-[2rem] bg-gradient-to-br from-white/10 to-transparent relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#B8860B" stroke-width="1.5"><path d="M23 6l-9.5 9.5-5-5L1 18"/><path d="M17 6h6v6"/></svg>
                </div>
                <div class="text-[10px] text-white/50 uppercase font-bold tracking-widest mb-1">Ваш капитал</div>
                <div class="text-3xl font-mono font-black mb-6">₽ 1 280 450</div>
                <div class="flex gap-3">
                    <button class="flex-1 gold-bg text-black rounded-xl py-3 text-[10px] font-black uppercase tracking-widest">Инвестировать</button>
                    <button class="w-12 glass rounded-xl flex items-center justify-center">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
                    </button>
                </div>
            </div>

            <!-- News Tag -->
            <div class="flex items-center gap-3 p-4 bg-emerald-500/10 rounded-2xl border border-emerald-500/20">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <div class="text-[10px] font-bold text-emerald-100">Нейронный интеллект: Обнаружено 3 объекта (24%+)</div>
            </div>

            <!-- Deals Slider -->
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <div class="text-[10px] font-black uppercase tracking-widest">Новые лоты</div>
                    <div class="text-[10px] gold-text font-bold uppercase">Все ></div>
                </div>
                <div class="flex gap-4 overflow-x-auto hide-scrollbar -mx-6 px-6">
                    <!-- Deal 1 -->
                    <div class="w-64 glass shrink-0 rounded-[2rem] overflow-hidden">
                        <div class="h-32 bg-gray-800 relative">
                            <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
                            <div class="absolute bottom-3 left-4 text-[10px] font-bold">Хамовники, Остоженка</div>
                        </div>
                        <div class="p-4">
                            <div class="flex justify-between items-end">
                                <div class="text-lg font-mono font-bold italic">15.5M</div>
                                <div class="text-sm gold-text font-black">+22.5%</div>
                            </div>
                        </div>
                    </div>
                    <!-- Deal 2 -->
                    <div class="w-64 glass shrink-0 rounded-[2rem] overflow-hidden">
                        <div class="h-32 bg-gray-800 relative">
                            <img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
                            <div class="absolute bottom-3 left-4 text-[10px] font-bold">Сочи, Центр</div>
                        </div>
                        <div class="p-4">
                            <div class="flex justify-between items-end">
                                <div class="text-lg font-mono font-bold italic">8.2M</div>
                                <div class="text-sm gold-text font-black">+24.0%</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation Bar -->
        <div class="h-20 glass m-4 rounded-[2rem] flex justify-around items-center px-4 shrink-0">
            <div class="flex flex-col items-center gap-1 gold-text">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
                <span class="text-[8px] font-bold uppercase tracking-widest">Обзор</span>
            </div>
            <div class="flex flex-col items-center gap-1 opacity-40">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <span class="text-[8px] font-bold uppercase tracking-widest">Сделки</span>
            </div>
            <div class="flex flex-col items-center gap-1 opacity-40">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
                <span class="text-[8px] font-bold uppercase tracking-widest">Активы</span>
            </div>
            <div class="flex flex-col items-center gap-1 opacity-40">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="text-[8px] font-bold uppercase tracking-widest">Кабинет</span>
            </div>
        </div>
    </div>

    <script>
        // Update clock
        function updateClock() {
            const now = new Date();
            const time = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = time;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
